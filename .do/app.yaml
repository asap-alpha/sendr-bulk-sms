# DigitalOcean App Platform spec for the Sendr Bulk SMS frontend (static site).
#
# Apply it either way:
#   • Dashboard: create the app from your repo, or Settings → "Edit your app spec"
#     and paste this in.
#   • CLI:  doctl apps create --spec .do/app.yaml   (or `doctl apps update <id> --spec .do/app.yaml`)
#
# The critical line is `catchall_document: index.html` — it makes App Platform serve
# index.html for any unmatched path, so deep links like /login and /app/compose work
# on refresh/direct-visit instead of 404ing (required for Vue Router history mode).
#
# NOTE: every VITE_* var is BUILD_TIME scope — Vite bakes them into the bundle during
# `npm run build`, so they must be present at build, not runtime. They also end up
# publicly visible in the shipped JS (Firebase web config + API URL are public config,
# not secrets — never put a real secret in a VITE_ var).

name: sendr-bulk-sms
region: fra # Frankfurt — lowest latency to Ghana. Alternatives: lon, ams.

static_sites:
  - name: web
    github:
      repo: https://github.com/asap-alpha/sendr-bulk-sms.git
      branch: main # change to your deploy branch (currently on `dev`)
      deploy_on_push: true

    build_command: npm run build
    output_dir: dist
    catchall_document: index.html # ← SPA fallback. Do not remove.

    envs:
      # Backend API base URL (no trailing slash).
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        value: https://api.cheqam.com

      # Firebase web config — the project the backend verifies ID tokens against.
      # SAME project as TailorsFlow (tailorflow-2e8c5), so auth + users are shared.
      # These are public web-config values (they ship in the JS bundle) — not secrets.
      - key: VITE_FIREBASE_API_KEY
        scope: BUILD_TIME
        value: AIzaSyB0r8loiqXBu8lnfAnoRdpxUSLW2Y85OAY
      - key: VITE_FIREBASE_AUTH_DOMAIN
        scope: BUILD_TIME
        value: tailorflow-2e8c5.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        scope: BUILD_TIME
        value: tailorflow-2e8c5
      - key: VITE_FIREBASE_STORAGE_BUCKET
        scope: BUILD_TIME
        value: tailorflow-2e8c5.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        scope: BUILD_TIME
        value: "777133043270"
      - key: VITE_FIREBASE_APP_ID
        scope: BUILD_TIME
        value: "1:777133043270:web:d5b4607c9437a7b36ee447"
