# DigitalOcean App Platform spec for the Sendr Bulk SMS frontend (static site).
#
# Apply it either way:
#   • Dashboard: Settings → "Edit your app spec" → Upload File (this file) → Save.
#   • CLI:  doctl apps update <id> --spec .do/app.yaml
#
# The critical line is `catchall_document: index.html` — it makes App Platform serve
# index.html for any unmatched path, so deep links like /login and /app/compose work
# on refresh/direct-visit instead of 404ing (required for Vue Router history mode).
#
# NOTE: every VITE_* var is BUILD_TIME scope — Vite bakes them into the bundle during
# `npm run build`, so they must be present at build, not runtime. The Firebase web config
# + API URL are PUBLIC config (they ship in the JS bundle) — not secrets, so plaintext is
# correct here. Never put a real secret in a VITE_ var.
alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: sendr-bulk-sms
    match:
      authority:
        exact: ""
      path:
        prefix: /
name: sendr-bulk-sms
region: fra
static_sites:
- build_command: npm run build
  catchall_document: index.html
  environment_slug: node-js
  envs:
  - key: VITE_API_BASE_URL
    scope: BUILD_TIME
    value: https://api.cheqam.com
  - key: VITE_FIREBASE_API_KEY
    scope: BUILD_TIME
    value: AIzaSyB0r8loiqXBu8lnfAnoRdpxUSLW2Y85OAY
  - key: VITE_FIREBASE_AUTH_DOMAIN
    scope: BUILD_TIME
    value: tailorflow-2e8c5.firebaseapp.com
  - key: VITE_FIREBASE_PROJECT_ID
    scope: BUILD_TIME
    value: tailorflow-2e8c5
  - key: VITE_FIREBASE_STORAGE_BUCKET
    scope: BUILD_TIME
    value: tailorflow-2e8c5.firebasestorage.app
  - key: VITE_FIREBASE_MESSAGING_SENDER_ID
    scope: BUILD_TIME
    value: "777133043270"
  - key: VITE_FIREBASE_APP_ID
    scope: BUILD_TIME
    value: "1:777133043270:web:d5b4607c9437a7b36ee447"
  github:
    branch: main
    deploy_on_push: true
    repo: asap-alpha/sendr-bulk-sms
  name: sendr-bulk-sms
  output_dir: dist
  source_dir: /
